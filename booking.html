<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay - Bafana Hotel Kaduna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fff1f2',
                            100: '#ffe4e6',
                            600: '#e11d48',
                            700: '#be123c',
                            800: '#9f1239',
                            900: '#881337',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .room-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .room-card.selected {
            border-color: #be123c;
            background-color: #fff1f2;
            box-shadow: 0 10px 25px -5px rgba(190, 18, 60, 0.1), 0 8px 10px -6px rgba(190, 18, 60, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased selection:bg-brand-600 selection:text-white">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-brand-700 rounded-2xl flex items-center justify-center text-white font-bold text-xl shadow-md shadow-brand-700/20 group-hover:scale-105 transition-transform">
                    B
                </div>
                <div>
                    <span class="font-serif text-2xl font-bold tracking-tight text-slate-900 block leading-none">Bafana</span>
                    <span class="text-[10px] font-bold tracking-widest text-brand-600 uppercase block mt-1">Hotel Kaduna</span>
                </div>
            </a>
            
            <a href="index.html" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-brand-700 transition-colors py-2 px-4 rounded-xl hover:bg-slate-100">
                <i class="fa-solid fa-arrow-left text-xs"></i>
                <span>Back to Home</span>
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <div class="max-w-2xl mb-10">
            <span class="text-xs font-bold tracking-wider text-brand-600 uppercase bg-brand-50 px-3 py-1.5 rounded-full border border-brand-100">Direct Reservation</span>
            <h1 class="font-serif text-4xl sm:text-5xl font-bold text-slate-900 mt-3 tracking-tight">Reserve Your Stay</h1>
            <p class="text-slate-600 mt-2 text-base sm:text-lg">Select your preferred room type and customize your accommodation details below.</p>
        </div>

        <div class="grid lg:grid-cols-12 gap-8 items-start">
            
            <section class="lg:col-span-7 space-y-4">
                <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2 mb-2">
                    <i class="fa-solid fa-bed text-brand-600"></i>
                    <span>1. Select Room Type</span>
                </h2>
                <div id="room-list" class="space-y-3">
                </div>
            </section>

            <section class="lg:col-span-5 lg:sticky lg:top-28">
                <form id="booking-form" onsubmit="proceedToPayment(event)" class="bg-white rounded-3xl border border-slate-200/80 shadow-xl shadow-slate-200/50 p-6 sm:p-8">
                    <h2 class="text-xl font-bold text-slate-900 border-b border-slate-100 pb-4 mb-6 flex items-center justify-between">
                        <span>Booking Details</span>
                        <i class="fa-solid fa-receipt text-slate-400 text-sm"></i>
                    </h2>

                    <div class="space-y-4 mb-6">
                        <div>
                            <label for="guest-name" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Full Name *</label>
                            <input type="text" id="guest-name" name="guestName" required placeholder="e.g. John Doe"
                                   class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-brand-600 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label for="guest-email" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Email Address *</label>
                            <input type="email" id="guest-email" name="guestEmail" required placeholder="e.g. john@example.com"
                                   class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-brand-600 focus:bg-white transition-all">
                        </div>
                    </div>
                    
                    <div class="p-4 rounded-2xl bg-slate-50 border border-slate-100 mb-6">
                        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1">Accommodation</span>
                        <p id="selected-name" class="font-bold text-lg text-slate-800">Deluxe Room</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label for="checkin" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Check-in</label>
                            <input type="date" id="checkin" required onchange="handleDateChange()"
                                   class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-brand-600 focus:bg-white transition-all">
                        </div>
                        <div>
                            <label for="checkout" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Check-out</label>
                            <input type="date" id="checkout" required onchange="handleDateChange()"
                                   class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-brand-600 focus:bg-white transition-all">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="p-4 border border-slate-200 rounded-2xl">
                            <span class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Rooms</span>
                            <div class="flex items-center justify-between">
                                <button type="button" onclick="changeRoomCount(-1)" aria-label="Decrease room count"
                                        class="w-8 h-8 rounded-lg border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-slate-100 hover:border-slate-300 transition-all font-bold">-</button>
                                <span id="room-count" class="font-bold text-lg text-slate-800">1</span>
                                <button type="button" onclick="changeRoomCount(1)" aria-label="Increase room count"
                                        class="w-8 h-8 rounded-lg border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-slate-100 hover:border-slate-300 transition-all font-bold">+</button>
                            </div>
                        </div>

                        <div class="p-4 border border-slate-200 rounded-2xl">
                            <span class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Guests</span>
                            <div class="flex items-center justify-between">
                                <button type="button" onclick="changeAdults(-1)" aria-label="Decrease guest count"
                                        class="w-8 h-8 rounded-lg border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-slate-100 hover:border-slate-300 transition-all font-bold">-</button>
                                <span id="adults-count" class="font-bold text-lg text-slate-800">2</span>
                                <button type="button" onclick="changeAdults(1)" aria-label="Increase guest count"
                                        class="w-8 h-8 rounded-lg border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-slate-100 hover:border-slate-300 transition-all font-bold">+</button>
                            </div>
                        </div>
                    </div>

                    <div class="border-t border-slate-100 pt-6 mb-6">
                        <div class="flex justify-between items-baseline mb-1">
                            <span id="total-label" class="text-sm font-medium text-slate-500">Total (1 room × 1 night)</span>
                            <span id="total-price" class="text-3xl font-extrabold text-brand-700">₦45,000</span>
                        </div>
                        <p class="text-xs text-slate-400 text-right">Includes all taxes & fees</p>
                    </div>

                    <button type="submit" 
                            class="w-full bg-brand-700 hover:bg-brand-800 active:scale-[0.99] text-white py-4 rounded-2xl font-bold shadow-lg shadow-brand-700/25 transition-all flex items-center justify-center gap-2 cursor-pointer">
                        <span>Proceed to Payment</span>
                        <i class="fa-solid fa-arrow-right text-sm"></i>
                    </button>
                </form>
            </section>
        </div>
    </main>

    <script>
        const roomsData = [
            { id: 0, name: "Deluxe Room", price: 45000, desc: "King bed, High-speed Wi-Fi, City view" },
            { id: 1, name: "Executive Suite", price: 85000, desc: "Separate lounge, Work desk, Free breakfast" },
            { id: 2, name: "Family Suite", price: 110000, desc: "2 Bedrooms, Living room, Kitchenette" },
            { id: 3, name: "Ocean View Twin", price: 55000, desc: "2 Twin beds, Scenic view, Smart TV" },
            { id: 4, name: "Junior Suite", price: 75000, desc: "King bed, Balcony, Express check-in" },
            { id: 5, name: "Presidential Suite", price: 250000, desc: "VIP Service, Private lounge, Panoramic views" }
        ];

        let state = {
            selectedRoomIndex: 0,
            roomCount: 1,
            adults: 2,
            nights: 1
        };

        function populateRooms() {
            const container = document.getElementById('room-list');
            container.innerHTML = roomsData.map(room => `
                <div onclick="selectRoom(${room.id})" 
                     id="room-${room.id}"
                     class="room-card bg-white border border-slate-200/80 p-5 rounded-2xl cursor-pointer hover:border-brand-600 flex justify-between items-center group ${room.id === state.selectedRoomIndex ? 'selected' : ''}">
                    <div>
                        <h3 class="text-lg font-bold text-slate-900 group-hover:text-brand-700 transition-colors">${room.name}</h3>
                        <p class="text-xs text-slate-500 mb-2">${room.desc}</p>
                        <p class="text-brand-700 font-extrabold text-lg">₦${room.price.toLocaleString()} 
                            <span class="text-xs font-normal text-slate-400">/ night</span>
                        </p>
                    </div>
                    <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center group-hover:bg-brand-50 group-hover:text-brand-700 transition-colors">
                        <i class="fa-solid fa-chevron-right text-xs"></i>
                    </div>
                </div>
            `).join('');
        }

        function selectRoom(index) {
            document.querySelectorAll('.room-card').forEach(el => el.classList.remove('selected'));
            const targetEl = document.getElementById(`room-${index}`);
            if (targetEl) targetEl.classList.add('selected');
            state.selectedRoomIndex = index;
            updateSummary();
        }

        function changeRoomCount(change) {
            state.roomCount = Math.max(1, Math.min(10, state.roomCount + change));
            document.getElementById('room-count').textContent = state.roomCount;
            updateSummary();
        }

        function changeAdults(change) {
            state.adults = Math.max(1, Math.min(20, state.adults + change));
            document.getElementById('adults-count').textContent = state.adults;
        }

        function calculateNights() {
            const checkinVal = document.getElementById('checkin').value;
            const checkoutVal = document.getElementById('checkout').value;
            
            if (!checkinVal || !checkoutVal) return 1;

            const date1 = new Date(checkinVal);
            const date2 = new Date(checkoutVal);
            
            const diffTime = date2 - date1;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            return diffDays > 0 ? diffDays : 1;
        }

        function handleDateChange() {
            const checkin = document.getElementById('checkin');
            const checkout = document.getElementById('checkout');
            
            if (new Date(checkout.value) <= new Date(checkin.value)) {
                const nextDay = new Date(checkin.value);
                nextDay.setDate(nextDay.getDate() + 1);
                checkout.value = nextDay.toISOString().split('T')[0];
            }
            
            checkout.min = checkin.value;
            state.nights = calculateNights();
            updateSummary();
        }

        function updateSummary() {
            if (state.selectedRoomIndex === null || !roomsData[state.selectedRoomIndex]) return;
            
            const room = roomsData[state.selectedRoomIndex];
            const total = room.price * state.roomCount * state.nights;
            
            document.getElementById('selected-name').textContent = room.name;
            document.getElementById('total-price').textContent = `₦${total.toLocaleString()}`;
            document.getElementById('total-label').textContent = 
                `Total (${state.roomCount} room${state.roomCount > 1 ? 's' : ''} × ${state.nights} night${state.nights > 1 ? 's' : ''})`;
        }

        function proceedToPayment(event) {
            event.preventDefault();

            const room = roomsData[state.selectedRoomIndex];
            const total = room.price * state.roomCount * state.nights;

            const bookingData = {
                guestName: document.getElementById('guest-name').value,
                guestEmail: document.getElementById('guest-email').value,
                roomName: room.name,
                checkin: document.getElementById('checkin').value,
                checkout: document.getElementById('checkout').value,
                nights: state.nights,
                roomCount: state.roomCount,
                adults: state.adults,
                totalAmount: total
            };

            sessionStorage.setItem('bookingDetails', JSON.stringify(bookingData));
            window.location.href = "payment.html";
        }

        // Initialize Page
        window.onload = () => {
            populateRooms();

            // Auto-select room based on URL search query (e.g. ?room=Executive Suite or ?roomId=1)
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room') || urlParams.get('roomId');

            if (roomParam !== null) {
                const foundIndex = roomsData.findIndex(r => 
                    r.id == roomParam || r.name.toLowerCase() === decodeURIComponent(roomParam).toLowerCase()
                );
                if (foundIndex !== -1) {
                    state.selectedRoomIndex = foundIndex;
                }
            }
            selectRoom(state.selectedRoomIndex);

            // Set default check-in / check-out dates
            const today = new Date();
            const tomorrow = new Date();
            tomorrow.setDate(today.getDate() + 1);
            
            const todayStr = today.toISOString().split('T')[0];
            const tomorrowStr = tomorrow.toISOString().split('T')[0];
            
            const checkinInput = document.getElementById('checkin');
            const checkoutInput = document.getElementById('checkout');
            
            checkinInput.value = todayStr;
            checkinInput.min = todayStr;
            
            checkoutInput.value = tomorrowStr;
            checkoutInput.min = tomorrowStr;
            
            state.nights = 1;
            updateSummary();
        };
    </script>
</body>
</html>
