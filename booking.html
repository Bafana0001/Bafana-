<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay - Bafana Hotel Kaduna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        .heading-font { font-family: 'Playfair Display', serif; }
        .room-option {
            transition: all 0.3s ease;
        }
        .room-option.selected {
            border-color: #e11d48;
            background-color: #fff1f2;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-50 bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-rose-700 rounded-full flex items-center justify-center text-white font-bold text-2xl">B</div>
                <div>
                    <span class="heading-font text-3xl font-bold">Bafana</span>
                    <span class="text-sm block -mt-1 text-rose-600">HOTEL</span>
                </div>
            </div>
            
            <!-- Changed to Back to Home -->
            <a href="index.html" class="flex items-center gap-2 text-gray-700 hover:text-rose-700 font-medium">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Back to Home</span>
            </a>
        </div>
    </nav>

    <div class="pt-24"></div>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <h1 class="heading-font text-5xl font-bold text-center mb-4">Book Your Stay</h1>
        <p class="text-center text-gray-600 mb-12">Select your room and preferences</p>

        <div class="grid lg:grid-cols-12 gap-10">
            <!-- ROOM SELECTION -->
            <div class="lg:col-span-7">
                <h2 class="text-2xl font-semibold mb-6">Select Room Type</h2>
                <div id="room-list" class="space-y-4"></div>
            </div>

            <!-- BOOKING SUMMARY -->
            <div class="lg:col-span-5">
                <div class="bg-white rounded-3xl shadow-xl p-8 sticky top-8">
                    <h2 class="text-2xl font-semibold mb-6">Booking Summary</h2>
                    
                    <div id="selected-room" class="mb-8">
                        <p class="text-gray-500 text-sm">Selected Room</p>
                        <p id="selected-name" class="font-medium text-xl">— No room selected —</p>
                    </div>

                    <!-- Number of Rooms -->
                    <div class="mb-8">
                        <label class="block text-sm text-gray-600 mb-3">Number of Rooms</label>
                        <div class="flex items-center gap-4">
                            <button onclick="changeRoomCount(-1)" 
                                    class="w-12 h-12 rounded-2xl border hover:bg-gray-100 flex items-center justify-center text-2xl font-light">-</button>
                            <span id="room-count" class="w-12 text-center text-3xl font-semibold">1</span>
                            <button onclick="changeRoomCount(1)" 
                                    class="w-12 h-12 rounded-2xl border hover:bg-gray-100 flex items-center justify-center text-2xl font-light">+</button>
                        </div>
                    </div>

                    <!-- Adults -->
                    <div class="mb-8">
                        <label class="block text-sm text-gray-600 mb-3">Number of Adults</label>
                        <div class="flex items-center gap-4">
                            <button onclick="changeAdults(-1)" 
                                    class="w-12 h-12 rounded-2xl border hover:bg-gray-100 flex items-center justify-center text-2xl font-light">-</button>
                            <span id="adults-count" class="w-12 text-center text-3xl font-semibold">2</span>
                            <button onclick="changeAdults(1)" 
                                    class="w-12 h-12 rounded-2xl border hover:bg-gray-100 flex items-center justify-center text-2xl font-light">+</button>
                        </div>
                    </div>

                    <!-- Dates -->
                    <div class="grid grid-cols-2 gap-6 mb-8">
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">Check-in Date</label>
                            <input type="date" id="checkin" class="w-full border rounded-2xl px-4 py-3 focus:outline-none focus:border-rose-500">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-600 mb-2">Check-out Date</label>
                            <input type="date" id="checkout" class="w-full border rounded-2xl px-4 py-3 focus:outline-none focus:border-rose-500">
                        </div>
                    </div>

                    <!-- Total -->
                    <div class="border-t pt-8">
                        <div class="flex justify-between text-lg mb-2">
                            <span id="total-label">Total (1 room × 1 night)</span>
                            <span id="total-price" class="font-bold text-3xl text-rose-700">₦0</span>
                        </div>
                        <p class="text-xs text-gray-500">Taxes &amp; service fees included</p>
                    </div>

                    <button onclick="proceedToPayment()" 
                            class="mt-10 w-full bg-rose-700 hover:bg-rose-800 text-white py-5 rounded-3xl text-lg font-semibold transition">
                        Proceed to Payment
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const roomsData = [
            { id: 0, name: "Deluxe Room", price: 45000 },
            { id: 1, name: "Executive Suite", price: 85000 },
            { id: 2, name: "Family Suite", price: 110000 },
            { id: 3, name: "Ocean View Twin", price: 55000 },
            { id: 4, name: "Junior Suite", price: 75000 },
            { id: 5, name: "Presidential Suite", price: 250000 }
        ];

        let selectedRoomIndex = null;
        let roomCount = 1;
        let adults = 2;

        function populateRooms() {
            const container = document.getElementById('room-list');
            container.innerHTML = roomsData.map(room => `
                <div onclick="selectRoom(${room.id})" 
                     id="room-${room.id}"
                     class="room-option border-2 border-transparent p-6 rounded-3xl cursor-pointer hover:border-rose-200 flex justify-between items-center">
                    <div>
                        <h3 class="text-2xl font-semibold">${room.name}</h3>
                        <p class="text-rose-700 font-bold text-xl mt-1">₦${room.price.toLocaleString()} <span class="text-sm font-normal text-gray-500">/ night</span></p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-400"></i>
                </div>
            `).join('');
        }

        function selectRoom(index) {
            document.querySelectorAll('.room-option').forEach(el => el.classList.remove('selected'));
            document.getElementById(`room-${index}`).classList.add('selected');
            selectedRoomIndex = index;
            updateSummary();
        }

        function changeRoomCount(change) {
            roomCount = Math.max(1, Math.min(10, roomCount + change));
            document.getElementById('room-count').textContent = roomCount;
            updateSummary();
        }

        function changeAdults(change) {
            adults = Math.max(1, Math.min(20, adults + change));
            document.getElementById('adults-count').textContent = adults;
        }

        function updateSummary() {
            if (selectedRoomIndex === null) return;
            const room = roomsData[selectedRoomIndex];
            const total = room.price * roomCount;
            
            document.getElementById('selected-name').textContent = room.name;
            document.getElementById('total-price').textContent = `₦${total.toLocaleString()}`;
            document.getElementById('total-label').textContent = `Total (\( {roomCount} room \){roomCount > 1 ? 's' : ''} × 1 night)`;
        }

        function proceedToPayment() {
            if (selectedRoomIndex === null) {
                alert("Please select a room type");
                return;
            }
            const room = roomsData[selectedRoomIndex];
            alert(`Booking Summary:\n\nRoom: ${room.name}\nRooms: ${roomCount}\nAdults: \( {adults}\nTotal Amount: ₦ \){(room.price * roomCount).toLocaleString()}\n\nThank you for choosing Bafana Hotel Kaduna!`);
        }

        // Initialize
        window.onload = () => {
            populateRooms();
            
            // Default dates
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('checkin').value = today;
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('checkout').value = tomorrow.toISOString().split('T')[0];
        };
    </script>
</body>
</html>
