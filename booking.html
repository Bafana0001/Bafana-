<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay - Bafana Hotel Kaduna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        .heading-font { font-family: 'Playfair Display', serif; }
        .room-option {
            transition: all 0.3s ease;
        }
        .room-option.selected {
            border-color: #e11d48;
            background-color: #fff1f2;
            box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.2);
        }
        .counter-btn {
            transition: all 0.2s ease;
        }
        .counter-btn:hover {
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-50 bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-rose-700 rounded-full flex items-center justify-center text-white font-bold text-2xl">B</div>
                <div>
                    <span class="heading-font text-3xl font-bold">Bafana</span>
                    <span class="text-sm block -mt-1 text-rose-600">HOTEL</span>
                </div>
            </div>
            
            <a href="index.html" class="flex items-center gap-2 text-gray-700 hover:text-rose-700 font-medium">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Back to Home</span>
            </a>
        </div>
    </nav>

    <div class="pt-24"></div>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="text-center mb-12">
            <h1 class="heading-font text-5xl font-bold text-gray-900">Book Your Stay</h1>
            <p class="text-gray-600 mt-3 text-lg">Choose your room and complete your reservation</p>
        </div>

        <div class="grid lg:grid-cols-12 gap-10">
            <!-- ROOM SELECTION -->
            <div class="lg:col-span-7">
                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-bed"></i> Select Room Type
                </h2>
                <div id="room-list" class="space-y-4"></div>
            </div>

            <!-- BOOKING SUMMARY -->
            <div class="lg:col-span-5">
                <div class="bg-white rounded-3xl shadow-2xl p-8 sticky top-8">
                    <h2 class="text-2xl font-semibold mb-8">Booking Summary</h2>
                    
                    <div class="mb-8">
                        <p class="text-gray-500 text-sm mb-1">Selected Room</p>
                        <p id="selected-name" class="font-semibold text-2xl text-gray-800">— Please select a room —</p>
                    </div>

                    <!-- Number of Rooms -->
                    <div class="mb-8">
                        <label class="block text-sm font-medium text-gray-600 mb-3">Number of Rooms</label>
                        <div class="flex items-center gap-6">
                            <button onclick="changeRoomCount(-1)" 
                                    class="counter-btn w-14 h-14 rounded-2xl border-2 border-gray-300 flex items-center justify-center text-3xl font-light hover:border-rose-300">-</button>
                            <span id="room-count" class="text-4xl font-semibold w-12 text-center">1</span>
                            <button onclick="changeRoomCount(1)" 
                                    class="counter-btn w-14 h-14 rounded-2xl border-2 border-gray-300 flex items-center justify-center text-3xl font-light hover:border-rose-300">+</button>
                        </div>
                    </div>

                    <!-- Adults -->
                    <div class="mb-8">
                        <label class="block text-sm font-medium text-gray-600 mb-3">Number of Adults</label>
                        <div class="flex items-center gap-6">
                            <button onclick="changeAdults(-1)" 
                                    class="counter-btn w-14 h-14 rounded-2xl border-2 border-gray-300 flex items-center justify-center text-3xl font-light hover:border-rose-300">-</button>
                            <span id="adults-count" class="text-4xl font-semibold w-12 text-center">2</span>
                            <button onclick="changeAdults(1)" 
                                    class="counter-btn w-14 h-14 rounded-2xl border-2 border-gray-300 flex items-center justify-center text-3xl font-light hover:border-rose-300">+</button>
                        </div>
                    </div>

                    <!-- Dates -->
                    <div class="grid grid-cols-2 gap-6 mb-10">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-2">Check-in</label>
                            <input type="date" id="checkin" 
                                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-rose-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-2">Check-out</label>
                            <input type="date" id="checkout" 
                                   class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-rose-500">
                        </div>
                    </div>

                    <!-- Total -->
                    <div class="border-t border-gray-200 pt-8">
                        <div class="flex justify-between items-end">
                            <div>
                                <span id="total-label" class="text-gray-600">Total (1 room × 1 night)</span>
                            </div>
                            <div class="text-right">
                                <span id="total-price" class="block text-4xl font-bold text-rose-700">₦0</span>
                                <span class="text-xs text-gray-500">incl. taxes &amp; fees</span>
                            </div>
                        </div>
                    </div>

                    <button onclick="proceedToPayment()" 
                            class="mt-10 w-full bg-rose-700 hover:bg-rose-800 py-6 rounded-3xl text-white text-xl font-semibold transition-all duration-300 flex items-center justify-center gap-3">
                        <span>Proceed to Payment</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const roomsData = [
            { id: 0, name: "Deluxe Room", price: 45000 },
            { id: 1, name: "Executive Suite", price: 85000 },
            { id: 2, name: "Family Suite", price: 110000 },
            { id: 3, name: "Ocean View Twin", price: 55000 },
            { id: 4, name: "Junior Suite", price: 75000 },
            { id: 5, name: "Presidential Suite", price: 250000 }
        ];

        let selectedRoomIndex = null;
        let roomCount = 1;
        let adults = 2;

        function populateRooms() {
            const container = document.getElementById('room-list');
            container.innerHTML = roomsData.map(room => `
                <div onclick="selectRoom(${room.id})" 
                     id="room-${room.id}"
                     class="room-option border-2 border-transparent p-6 rounded-3xl cursor-pointer hover:border-rose-200 flex justify-between items-center">
                    <div>
                        <h3 class="text-2xl font-semibold">${room.name}</h3>
                        <p class="text-rose-700 font-bold text-xl mt-1">₦${room.price.toLocaleString()} 
                            <span class="text-sm font-normal text-gray-500">/ night</span>
                        </p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-400"></i>
                </div>
            `).join('');
        }

        function selectRoom(index) {
            document.querySelectorAll('.room-option').forEach(el => el.classList.remove('selected'));
            document.getElementById(`room-${index}`).classList.add('selected');
            selectedRoomIndex = index;
            updateSummary();
        }

        function changeRoomCount(change) {
            roomCount = Math.max(1, Math.min(8, roomCount + change));
            document.getElementById('room-count').textContent = roomCount;
            updateSummary();
        }

        function changeAdults(change) {
            adults = Math.max(1, Math.min(20, adults + change));
            document.getElementById('adults-count').textContent = adults;
        }

        function updateSummary() {
            if (selectedRoomIndex === null) return;
            
            const room = roomsData[selectedRoomIndex];
            const total = room.price * roomCount;
            
            document.getElementById('selected-name').textContent = room.name;
            document.getElementById('total-price').textContent = `₦${total.toLocaleString()}`;
            document.getElementById('total-label').textContent = `Total (\( {roomCount} room \){roomCount > 1 ? 's' : ''} × 1 night)`;
        }

        function proceedToPayment() {
            if (selectedRoomIndex === null) {
                alert("Please select a room type before proceeding.");
                return;
            }
            const room = roomsData[selectedRoomIndex];
            const total = room.price * roomCount;
            
            alert(`✅ Booking Summary\n\nRoom: ${room.name}\nNumber of Rooms: ${roomCount}\nAdults: \( {adults}\nTotal Amount: ₦ \){total.toLocaleString()}\n\nThank you for choosing Bafana Hotel Kaduna!`);
        }

        // Initialize
        window.onload = () => {
            populateRooms();
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('checkin').value = today;
            
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('checkout').value = tomorrow.toISOString().split('T')[0];
        };
    </script>
</body>
</html>
