<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Gallery</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: sans-serif;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .glass-card {
            /* Liquid Glass Effect */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            
            /* Content Layout */
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: scale(1.03);
        }

        .image-placeholder {
            width: 100%;
            height: 200px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.7);
            font-weight: bold;
            border: 1px dashed rgba(255, 255, 255, 0.3);
        }

        h2 {
            text-align: center;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h2>Liquid Glass Gallery</h2>

    <div class="gallery-container">
        <div class="glass-card"><div class="image-placeholder">IMAGE 1</div></div>
        <div class="glass-card"><div class="image-placeholder">IMAGE 2</div></div>
        <div class="glass-card"><div class="image-placeholder">IMAGE 3</div></div>
        <div class="glass-card"><div class="image-placeholder">IMAGE 4</div></div>
        <div class="glass-card"><div class="image-placeholder">IMAGE 5</div></div>
        <div class="glass-card"><div class="image-placeholder">IMAGE 6</div></div>
    </div>

</body>
</html>
