<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <meta name="description" content="Bafana Hotel Kaduna - Luxury accommodation in Kaduna, Nigeria.">  
    <title>Bafana Hotel Kaduna | Luxury Stays</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">  
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">  
    <style>  
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');  
          
        .heading-font { font-family: 'Playfair Display', serif; }  
          
        .hero-bg {  
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), url('https://picsum.photos/id/1015/2000/1200');  
            background-size: cover;  
            background-position: center;  
        }  
          
        .amenities-bg {  
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('https://picsum.photos/id/1015/2000/800');  
            background-size: cover;  
            background-position: center;  
        }  
    </style>
</head>  
<body class="tail-container text-gray-800">  

<nav id="navbar" class="fixed top-0 w-full z-30 bg-white shadow-sm transition-all duration-300">  
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">  
        <div class="flex items-center gap-x-3">  
            <div class="w-10 h-10 bg-rose-700 rounded-full flex items-center justify-center text-white font-bold text-2xl">B</div>  
            <div>  
                <span class="heading-font text-3xl font-bold">Bafana</span>  
                <span class="text-sm block -mt-1 text-rose-600">INTERNATIONAL</span>  
            </div>  
        </div>  

        <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">  
            <a href="index.html" class="hover:text-rose-700">Home</a>  
            <a href="post/about.html" class="hover:text-rose-700">About</a>  
            <a href="rooms.html" class="hover:text-rose-700">Rooms</a>  
            <a href="facilities.html" class="hover:text-rose-700">Facilities</a>  
            <a href="restaurant.html" class="hover:text-rose-700">Restaurant</a>  
            <a href="gallery.html" class="hover:text-rose-700">Gallery</a>  
            <a href="booking.html" class="hover:text-rose-700">Booking</a>  
            <a href="contact.html" class="hover:text-rose-700">Contact</a>  
        </div>  

        <div class="flex items-center gap-4">
            <button onclick="window.location.href='booking.html'" class="hidden md:block bg-rose-700 text-white px-6 py-3 rounded-2xl hover:bg-rose-800 font-semibold">Book Now</button> 
            <button id="openMenu" class="md:hidden text-2xl text-gray-800 focus:outline-none">
                <i class="fas fa-bars"></i>
            </button>
        </div> 
    </div>  
</nav>  

<div id="menuOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-40 transition-opacity"></div>  

<div id="sideMenu" class="fixed top-0 right-0 h-full w-4/5 md:w-1/2 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50">  
    <div class="flex justify-end p-6">  
        <button id="closeMenu" class="text-4xl text-gray-700 hover:text-red-500">&times;</button>  
    </div>  

    <nav class="px-8">  
        <ul class="space-y-6 text-xl font-semibold">  
            <li><a href="post/about.html" class="hover:text-yellow-600 transition">About</a></li>  
            <li><a href="rooms.html" class="hover:text-yellow-600 transition">Rooms</a></li>  
            <li><a href="facilities.html" class="hover:text-yellow-600 transition">Facilities</a></li>  
            <li><a href="restaurant.html" class="hover:text-yellow-600 transition">Restaurant</a></li>  
            <li><a href="gallery.html" class="hover:text-yellow-600 transition">Gallery</a></li>  
            <li><a href="booking.html" class="hover:text-yellow-600 transition">Booking</a></li>  
            <li><a href="contact.html" class="hover:text-yellow-600 transition">Contact</a></li>  
            <li><a href="post/faq.html" class="hover:text-yellow-600 transition">FAQ</a></li>  
        </ul>  

        <div class="mt-10">  
            <a href="https://wa.me/xxxxxx" target="_blank" class="block text-center bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-full transition">  
                🟢 WhatsApp  
            </a>  
        </div>  
    </nav>
</div>

<script>  
    window.addEventListener('scroll', () => {  
        const navbar = document.getElementById('navbar');  
        if (window.scrollY > 50) {  
            navbar.classList.add('bg-white/95', 'backdrop-blur-md');  
        } else {  
            navbar.classList.remove('bg-white/95', 'backdrop-blur-md');  
        }  
    });  

    const openMenuBtn = document.getElementById('openMenu');
    const closeMenuBtn = document.getElementById('closeMenu');
    const sideMenu = document.getElementById('sideMenu');
    const menuOverlay = document.getElementById('menuOverlay');

    function openMenu() {
        sideMenu.classList.remove('translate-x-full');
        menuOverlay.classList.remove('hidden');
    }

    function closeMenu() {
        sideMenu.classList.add('translate-x-full');
        menuOverlay.classList.add('hidden');
    }

    openMenuBtn.addEventListener('click', openMenu);
    closeMenuBtn.addEventListener('click', closeMenu);
    menuOverlay.addEventListener('click', closeMenu);
</script>

</body>  
</html>
