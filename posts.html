<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ | Bafana Hotel Kaduna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

<nav class="bg-white shadow-sm p-6 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <a href="../index.html" class="text-2xl font-bold text-rose-700">Bafana Hotel</a>
        <div class="hidden md:flex gap-6 font-medium">
            <a href="../index.html" class="hover:text-rose-700">Home</a>
            <a href="about.html" class="hover:text-rose-700">About</a>
            <a href="faq.html" class="text-rose-700 border-b-2 border-rose-700">FAQ</a>
        </div>
    </div>
</nav>

<section class="py-16 text-center">
    <h1 class="text-5xl font-bold mb-4">Frequently Asked Questions</h1>
</section>

<section class="max-w-3xl mx-auto px-6 pb-20">
    <div class="space-y-4">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <button class="w-full text-left font-bold text-lg flex justify-between items-center" onclick="toggleFaq(this)">
                What are your check-in and check-out times?
                <i class="fas fa-chevron-down text-rose-700"></i>
            </button>
            <div class="hidden pt-4 text-gray-600">Standard check-in is at 2:00 PM and check-out is at 12:00 PM.</div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <button class="w-full text-left font-bold text-lg flex justify-between items-center" onclick="toggleFaq(this)">
                Is Wi-Fi included?
                <i class="fas fa-chevron-down text-rose-700"></i>
            </button>
            <div class="hidden pt-4 text-gray-600">Yes, we provide complimentary high-speed Wi-Fi for all guests.</div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <button class="w-full text-left font-bold text-lg flex justify-between items-center" onclick="toggleFaq(this)">
                Do you offer airport pickup?
                <i class="fas fa-chevron-down text-rose-700"></i>
            </button>
            <div class="hidden pt-4 text-gray-600">Yes, please contact our concierge 24 hours in advance to arrange your transport.</div>
        </div>
    </div>
</section>

<script>
    function toggleFaq(btn) {
        const content = btn.nextElementSibling;
        const icon = btn.querySelector('i');
        content.classList.toggle('hidden');
        icon.classList.toggle('fa-chevron-up');
        icon.classList.toggle('fa-chevron-down');
    }
</script>

</body>
</html>
