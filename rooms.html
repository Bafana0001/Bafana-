<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms & Suites - Bafana Hotel Kaduna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        
        .heading-font { font-family: 'Playfair Display', serif; }
        
        .room-media {
            position: relative;
            height: 280px;
            overflow: hidden;
            cursor: pointer;
        }
        .room-media img {
            transition: all 0.6s ease;
        }
        .room-card:hover .room-media img {
            transform: scale(1.06);
        }
        .gallery-thumb {
            transition: all 0.3s ease;
        }
        .gallery-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        /* Modal */
        #image-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal-image {
            max-height: 88vh;
            max-width: 95%;
            object-fit: contain;
            border-radius: 12px;
            transition: opacity 0.4s ease;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- NAVBAR -->
    <nav id="navbar" class="fixed top-0 w-full z-50 bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-rose-700 rounded-full flex items-center justify-center text-white font-bold text-2xl">B</div>
                <div>
                    <span class="heading-font text-3xl font-bold">Bafana</span>
                    <span class="text-sm block -mt-1 text-rose-600">HOTEL</span>
                </div>
            </div>

            <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                <a href="index.html" class="hover:text-rose-700">Home</a>
                <a href="about.html" class="hover:text-rose-700">About</a>
                <a href="rooms.html" class="text-rose-700 font-semibold">Rooms</a>
                <a href="facilities.html" class="hover:text-rose-700">Facilities</a>
                <a href="restaurant.html" class="hover:text-rose-700">Restaurant</a>
                <a href="gallery.html" class="hover:text-rose-700">Gallery</a>
                <a href="booking.html" class="hover:text-rose-700">Booking</a>
                <a href="contact.html" class="hover:text-rose-700">Contact</a>
                <a href="faq.html" class="hover:text-rose-700">FAQ</a>
            </div>

            <a href="booking.html" class="bg-rose-700 text-white px-6 py-3 rounded-2xl hover:bg-rose-800 font-semibold">
                Book Now
            </a>
        </div>
    </nav>

    <div class="pt-24"></div>

    <!-- ROOMS HERO -->
    <section class="bg-gray-900 text-white py-20">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="heading-font text-6xl font-bold mb-4">Our Rooms & Suites</h1>
            <p class="text-xl text-gray-300">Comfort, elegance, and unforgettable experiences</p>
        </div>
    </section>

    <!-- ROOMS GRID -->
    <section class="py-20 bg-white">
        <div class="max-w-7xl mx-auto px-6">
            <div id="rooms-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
                <!-- Populated by JS -->
            </div>
        </div>
    </section>

    <!-- FULLSCREEN CAROUSEL MODAL -->
    <div id="image-modal">
        <div class="relative w-full h-full flex items-center justify-center">
            <button onclick="closeModal()" 
                    class="absolute top-6 right-6 text-white text-5xl hover:text-rose-400 z-10">×</button>
            
            <button onclick="prevImage()" 
                    class="absolute left-6 text-white text-6xl hover:text-rose-400 z-10">‹</button>
            
            <img id="modal-image" class="modal-image" src="" alt="">
            
            <button onclick="nextImage()" 
                    class="absolute right-6 text-white text-6xl hover:text-rose-400 z-10">›</button>
            
            <div id="modal-counter" class="absolute bottom-8 bg-black/60 text-white px-6 py-2 rounded-full text-sm">
                1 / 5
            </div>
        </div>
    </div>

    <script>
        const roomsData = [
            {
                id: "deluxe",
                title: "Deluxe Room",
                price: "₦45,000",
                hero: "https://picsum.photos/id/201/800/600",
                images: [
                    "https://picsum.photos/id/201/1200/800",
                    "https://picsum.photos/id/102/1200/800",
                    "https://picsum.photos/id/133/1200/800",
                    "https://picsum.photos/id/106/1200/800"
                ],
                amenities: ["King Bed", "Free Wi-Fi", "Air Conditioning", "City View"]
            },
            {
                id: "executive",
                title: "Executive Suite",
                price: "₦85,000",
                hero: "https://picsum.photos/id/251/800/600",
                images: [
                    "https://picsum.photos/id/251/1200/800",
                    "https://picsum.photos/id/180/1200/800",
                    "https://picsum.photos/id/106/1200/800"
                ],
                amenities: ["Separate Living Area", "Balcony", "Mini Bar", "Jacuzzi"]
            },
            {
                id: "family",
                title: "Family Suite",
                price: "₦110,000",
                hero: "https://picsum.photos/id/316/800/600",
                images: [
                    "https://picsum.photos/id/316/1200/800",
                    "https://picsum.photos/id/145/1200/800",
                    "https://picsum.photos/id/201/1200/800"
                ],
                amenities: ["2 Bedrooms", "Living Room", "Kitchenette", "Kids Area"]
            },
            {
                id: "ocean",
                title: "Ocean View Twin",
                price: "₦55,000",
                hero: "https://picsum.photos/id/145/800/600",
                images: ["https://picsum.photos/id/145/1200/800", "https://picsum.photos/id/160/1200/800", "https://picsum.photos/id/201/1200/800"],
                amenities: ["Two Queen Beds", "Ocean View", "Balcony", "Wi-Fi"]
            },
            {
                id: "junior",
                title: "Junior Suite",
                price: "₦75,000",
                hero: "https://picsum.photos/id/175/800/600",
                images: ["https://picsum.photos/id/175/1200/800", "https://picsum.photos/id/180/1200/800", "https://picsum.photos/id/106/1200/800"],
                amenities: ["Work Desk", "Spacious Bathroom", "City View", "Mini Bar"]
            },
            {
                id: "presidential",
                title: "Presidential Suite",
                price: "₦250,000",
                hero: "https://picsum.photos/id/201/800/600",
                images: ["https://picsum.photos/id/201/1200/800", "https://picsum.photos/id/133/1200/800", "https://picsum.photos/id/1015/1200/800"],
                amenities: ["Private Terrace", "Dining Area", "Luxury Bath", "Butler Service"]
            }
        ];

        let currentRoomIndex = 0;
        let currentImageIndex = 0;
        let autoSlideInterval = null;

        function createRoomCard(room, index) {
            const cardHTML = `
                <div class="room-card bg-white rounded-3xl overflow-hidden shadow-xl group">
                    <div class="room-media" onclick="openRoomGallery(${index})">
                        <img id="hero-\( {index}" src=" \){room.hero}" alt="${room.title}" class="w-full h-72 object-cover">
                    </div>
                    <div class="p-8">
                        <h3 class="text-3xl font-semibold mb-2">${room.title}</h3>
                        <p class="text-rose-700 text-3xl font-bold">${room.price} <span class="text-base font-normal text-gray-500">/ night</span></p>
                        
                        <div class="gallery grid grid-cols-4 gap-3 mt-6" id="gallery-${index}">
                            <!-- Thumbnails added by JS -->
                        </div>

                        <ul class="mt-6 space-y-2 text-sm">
                            ${room.amenities.map(am => `
                                <li class="flex items-center gap-3">
                                    <i class="fa-solid fa-check text-green-500"></i> ${am}
                                </li>
                            `).join('')}
                        </ul>

                        <a href="booking.html" class="mt-10 block w-full text-center py-4 bg-rose-700 text-white rounded-2xl hover:bg-rose-800 font-semibold transition">
                            Book This Room
                        </a>
                    </div>
                </div>
            `;
            return cardHTML;
        }

        function populateRooms() {
            const container = document.getElementById('rooms-grid');
            container.innerHTML = roomsData.map((room, i) => createRoomCard(room, i)).join('');

            // Add thumbnails
            roomsData.forEach((room, roomIndex) => {
                const gallery = document.getElementById(`gallery-${roomIndex}`);
                room.images.forEach((imgSrc, imgIndex) => {
                    const thumb = document.createElement('img');
                    thumb.src = imgSrc.replace('1200/800', '300/200');
                    thumb.className = "gallery-thumb w-full aspect-video object-cover rounded-xl cursor-pointer";
                    thumb.onclick = (e) => {
                        e.stopImmediatePropagation();
                        openRoomGallery(roomIndex, imgIndex);
                    };
                    gallery.appendChild(thumb);
                });
            });
        }

        function startAutoSlides() {
            if (autoSlideInterval) clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => {
                roomsData.forEach((room, i) => {
                    const hero = document.getElementById(`hero-${i}`);
                    if (!hero) return;
                    let next = (room.currentIdx || 0) + 1;
                    if (next >= room.images.length) next = 0;
                    room.currentIdx = next;

                    hero.style.opacity = '0';
                    setTimeout(() => {
                        hero.src = room.images[next];
                        hero.style.opacity = '1';
                    }, 300);
                });
            }, 4000);
        }

        function openRoomGallery(roomIndex, startIdx = 0) {
            currentRoomIndex = roomIndex;
            currentImageIndex = startIdx;
            document.getElementById('image-modal').style.display = 'flex';
            showCurrentImage();
        }

        function showCurrentImage() {
            const img = document.getElementById('modal-image');
            const counter = document.getElementById('modal-counter');
            const room = roomsData[currentRoomIndex];
            
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = room.images[currentImageIndex];
                img.style.opacity = 1;
                counter.textContent = `${currentImageIndex + 1} / ${room.images.length}`;
            }, 200);
        }

        function nextImage() {
            const room = roomsData[currentRoomIndex];
            currentImageIndex = (currentImageIndex + 1) % room.images.length;
            showCurrentImage();
        }

        function prevImage() {
            const room = roomsData[currentRoomIndex];
            currentImageIndex = (currentImageIndex - 1 + room.images.length) % room.images.length;
            showCurrentImage();
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
        }

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (document.getElementById('image-modal').style.display !== 'flex') return;
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'Escape') closeModal();
        });

        // Initialize
        window.onload = () => {
            populateRooms();
            startAutoSlides();
            
            // Close modal on background click
            document.getElementById('image-modal').addEventListener('click', e => {
                if (e.target.id === 'image-modal') closeModal();
            });
        };
    </script>
</body>
</html>
